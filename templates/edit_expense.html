{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Edit Expense</h1>
      <p class="auth-subtitle">Update the details below.</p>
    </div>
    <div class="auth-card">
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 step="0.01" min="0.01" required
                 value="{{ expense.amount }}">
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if cat == expense.category %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 required value="{{ expense.date }}">
        </div>
        <div class="form-group">
          <label for="description">Description <span class="text-muted">(optional)</span></label>
          <input type="text" id="description" name="description" class="form-input"
                 placeholder="e.g. Lunch at cafe"
                 value="{{ expense.description or '' }}">
        </div>
        <button type="submit" class="btn-submit">Save Changes</button>
      </form>
    </div>
    <p class="auth-switch"><a href="{{ url_for('profile') }}">Cancel</a></p>
  </div>
</section>
{% endblock %}
